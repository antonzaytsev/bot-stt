services:
  web:
    build: .
    command: web
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    command: worker
    restart: unless-stopped
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  poller:
    build: .
    command: poller
    restart: unless-stopped
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  bundle:
  redis_data:
